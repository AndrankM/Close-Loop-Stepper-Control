<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Closed-Loop Stepper Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 1.4rem 1.25rem 2rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .page-header h1 { margin-bottom: 0.4rem; }
    .page-header .sub {
      color: #5a6178;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 0.05em;
      color: #a0cfff;
    }

    .units {
      max-width: 1720px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }
    @media (max-width: 1180px) {
      .units { grid-template-columns: 1fr; }
    }
    .motor-unit {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 1.1rem 1.35rem 1.35rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }
    .unit-title {
      font-size: 1.05rem;
      color: #cfd6ee;
      letter-spacing: 0.05em;
      margin-bottom: 0.85rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid #2a2d3e;
    }
    .unit-title small { color: #5a6178; font-size: 0.74rem; letter-spacing: 0.04em; }

    .unit-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1.1rem;
      align-items: stretch;
      flex: 1;
    }
    @media (max-width: 760px) {
      .unit-body { grid-template-columns: 1fr; }
    }

    .panel {
      background: #161922;
      border: 1px solid #242838;
      border-radius: 12px;
      padding: 1.05rem 1.2rem;
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 0.98rem;
      letter-spacing: 0.04em;
      color: #a0cfff;
      margin-bottom: 0.9rem;
      text-align: left;
    }

    button {
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: default; }

    /* --- Stepper motor card --- */
    .motor-status {
      font-size: 0.95rem;
      margin-bottom: 0.55rem;
      color: #888;
    }
    .motor-status span { font-weight: bold; }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
      gap: 0.75rem;
    }
    .control-row label {
      font-size: 0.9rem;
      color: #9aa4bf;
      text-align: left;
    }

    .dir-toggle { display: flex; gap: 0.5rem; }
    .dir-toggle button {
      padding: 0.5rem 1rem;
      background: #2a2d3e;
      color: #cfd6ee;
    }
    .dir-toggle button.active { background: #4a78ff; color: #fff; }

    .speed-value {
      font-weight: bold;
      color: #a0cfff;
      min-width: 4.5rem;
      text-align: right;
    }
    input[type="range"] { width: 100%; accent-color: #4a78ff; }

    .num-input {
      width: 5.5rem;
      padding: 0.4rem 0.5rem;
      background: #12141c;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      text-align: right;
    }
    .geometry {
      border-top: 1px solid #2a2d3e;
      margin-top: 0.9rem;
      padding-top: 0.9rem;
    }

    .btn-motor-on  { background: #00cc66; color: #000; }
    .btn-motor-off { background: #e03e3e; color: #fff; }

    .btn-estop {
      width: 100%;
      margin-top: 1rem;
      background: #7a1d1d;
      color: #ffd5d5;
      border: 1px solid #b03030;
      letter-spacing: 0.08em;
    }

    /* --- Encoder card --- */
    .encoder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem 1rem;
      margin: 0.75rem 0 1rem;
    }
    .enc-cell { text-align: left; }
    .enc-cell .enc-k {
      font-size: 0.72rem;
      color: #9aa4bf;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .enc-cell .enc-v {
      font-size: 1.15rem;
      font-weight: bold;
      color: #a0cfff;
    }
    .enc-dial {
      width: 74px; height: 74px;
      margin: 0.2rem auto 0.6rem;
      border-radius: 50%;
      border: 3px solid #2a2d3e;
      position: relative;
      background: radial-gradient(circle at center, #161924, #0d0f16);
    }
    .enc-needle {
      position: absolute;
      left: 50%; top: 50%;
      width: 3px; height: 30px;
      background: #4a78ff;
      transform-origin: bottom center;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 2px;
      transition: transform 0.15s linear;
    }
    .enc-hub {
      position: absolute; left: 50%; top: 50%;
      width: 10px; height: 10px; border-radius: 50%;
      background: #4a78ff; transform: translate(-50%, -50%);
    }
    .enc-error { color: #e0863e; font-size: 0.8rem; }

    .live-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #00ff88;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.35);
      border-radius: 20px;
      padding: 0.25rem 0.7rem;
    }
    .live-badge.stale {
      color: #e0863e;
      background: rgba(224,134,62,0.1);
      border-color: rgba(224,134,62,0.35);
    }
    @keyframes live-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .live-badge:not(.stale) { animation: live-pulse 1.4s ease-in-out infinite; }

    .rev-counter {
      background: #0d0f16;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
    }
    .rev-counter-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .rev-counter-k {
      font-size: 0.72rem;
      color: #9aa4bf;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .rev-reset-btn {
      background: #2a2d3e;
      color: #cfd6ee;
      padding: 0.25rem 0.7rem;
      font-size: 0.72rem;
      border-radius: 6px;
    }
    .rev-reset-btn:hover { background: #353952; }
    .rev-counter-v {
      font-size: 1.9rem;
      font-weight: 800;
      color: #a0cfff;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .enc-chart-wrap {
      background: #0d0f16;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      padding: 0.5rem;
    }
    .enc-chart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: #9aa4bf;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }
    .enc-chart-head select {
      background: #161924;
      color: #cfd6ee;
      border: 1px solid #2a2d3e;
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-size: 0.72rem;
    }

    .encoder-layout {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      gap: 0.85rem;
      align-items: stretch;
      flex: 1;
    }
    .encoder-readout { text-align: center; }
    .encoder-plot { display: flex; flex-direction: column; min-height: 0; }
    .encoder-plot .enc-chart-wrap { display: flex; flex-direction: column; flex: 1; }
    .encoder-plot canvas { width: 100%; height: auto; flex: 1; min-height: 130px; display: block; }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Closed-Loop Stepper Control</h1>
    <div class="sub">4&times; NEMA 17 &middot; MKS SERVO42C</div>
  </div>

  <div class="units" id="units"></div>

  <p class="footer">AndPI5 &middot; 192.168.0.101:5000</p>

  <script>
    // Motor definitions: id, friendly name, wiring note, and gear reduction.
    const MOTORS = [
      { id: 1, name: 'Motor 1', gear: 1, wiring: 'EN GPIO17 · STP GPIO27 · DIR GPIO22 · addr 0xE0 · direct drive' },
      { id: 2, name: 'Motor 2', gear: 5, wiring: 'EN GPIO2 · STP GPIO3 · DIR GPIO4 · addr 0xE1 · 5:1 planetary' },
      { id: 3, name: 'Motor 3', gear: 1, wiring: 'EN GPIO10 · STP GPIO9 · DIR GPIO11 · addr 0xE2 · direct drive' },
      { id: 4, name: 'Motor 4', gear: 1, wiring: 'EN GPIO16 · STP GPIO20 · DIR GPIO21 · addr 0xE3 · direct drive' },
    ];

    function unitHTML(m) {
      const i = m.id;
      return `
      <div class="motor-unit">
        <div class="unit-title">${m.name} <small>${m.wiring}</small></div>
        <div class="unit-body">
          <div class="panel">
            <div class="card-title">Motor Control · NEMA 17</div>
            <p class="motor-status">State: <span id="motor-state-${i}">Loading...</span></p>
            <p class="motor-status" style="margin-top:-0.75rem;">
              Live: <span id="live-rpm-${i}" style="color:#a0cfff;">0</span> RPM
              (<span id="live-sps-${i}">0</span> sps)
            </p>

            <div class="control-row">
              <label>Direction</label>
              <div class="dir-toggle">
                <button id="dir-cw-${i}"  onclick="setDirection(${i}, 'cw')">CW &#8635;</button>
                <button id="dir-ccw-${i}" onclick="setDirection(${i}, 'ccw')">CCW &#8634;</button>
              </div>
            </div>

            <div class="control-row">
              <label>Speed</label>
              <span class="speed-value">
                <span id="speed-label-${i}">400</span> sps
                &middot; <span id="rpm-label-${i}">--</span> RPM
              </span>
            </div>
            <input type="range" id="speed-slider-${i}" min="1" max="6000" value="400"
                   oninput="onSpeedInput(${i}, this.value)" onchange="commitSpeed(${i}, this.value)" />

            <div class="control-row" style="margin-top:1.25rem;">
              <label>Acceleration</label>
              <span class="speed-value"><span id="accel-label-${i}">4000</span> sps&sup2;</span>
            </div>
            <input type="range" id="accel-slider-${i}" min="100" max="50000" step="100" value="4000"
                   oninput="onAccelInput(${i}, this.value)" onchange="commitAccel(${i}, this.value)" />

            <div class="control-row" style="margin-top:1.25rem;">
              <label>Target RPM</label>
              <div style="display:flex; gap:0.5rem;">
                <input type="number" id="rpm-input-${i}" class="num-input" min="0" step="0.1" value="0" />
                <button class="dir-toggle" style="background:#4a78ff;color:#fff;padding:0.5rem 1rem;"
                        onclick="setRpm(${i})">Set</button>
              </div>
            </div>

            <div class="geometry">
              <div class="control-row">
                <label>Full steps / rev</label>
                <input type="number" id="fsteps-input-${i}" class="num-input" min="1" value="200"
                       onchange="setGeometry(${i})" />
              </div>
              <div class="control-row" style="margin-bottom:0;">
                <label>Microstepping</label>
                <select id="micro-input-${i}" class="num-input" onchange="setGeometry(${i})">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="4">4</option>
                  <option value="8">8</option>
                  <option value="16" selected>16</option>
                  <option value="32">32</option>
                  <option value="64">64</option>
                  <option value="128">128</option>
                  <option value="256">256</option>
                </select>
              </div>
            </div>

            <div class="buttons" style="display:flex; gap:1rem; justify-content:center; margin-top:1.1rem;">
              <button class="btn-motor-off" onclick="softStop(${i})">Disable</button>
              <button class="btn-motor-on"  onclick="setMotor(${i}, 'enable')">Enable</button>
            </div>
            <button class="btn-estop" onclick="hardStop(${i})">&#9888; EMERGENCY STOP</button>
          </div>

          <div class="panel">
            <div class="control-row" style="margin-bottom:1rem;">
              <div class="card-title" style="margin-bottom:0;">
                Encoder${m.gear !== 1 ? ' · output shaft' : ''} · SERVO42C (UART)
                ${m.gear !== 1 ? `<span style="color:#5a6178;font-size:0.72rem;">${m.gear}:1</span>` : ''}
              </div>
              <span class="live-badge" id="enc-live-${i}">&#9679; LIVE</span>
            </div>
            <div class="encoder-layout">
              <div class="encoder-readout">
                <div class="rev-counter">
                  <div class="rev-counter-head">
                    <span class="rev-counter-k">Turns since reset</span>
                    <button class="rev-reset-btn" onclick="resetTurns(${i})">Reset</button>
                  </div>
                  <div class="rev-counter-v"><span id="enc-turns-${i}">--</span></div>
                </div>
                <div class="enc-dial">
                  <div class="enc-needle" id="enc-needle-${i}"></div>
                  <div class="enc-hub"></div>
                </div>
                <div class="encoder-grid">
                  <div class="enc-cell">
                    <div class="enc-k">Shaft angle</div>
                    <div class="enc-v"><span id="enc-angle-${i}">--</span>&deg;</div>
                  </div>
                  <div class="enc-cell">
                    <div class="enc-k">Revolutions</div>
                    <div class="enc-v" id="enc-revs-${i}">--</div>
                  </div>
                  <div class="enc-cell">
                    <div class="enc-k">Total angle</div>
                    <div class="enc-v"><span id="enc-total-${i}">--</span>&deg;</div>
                  </div>
                  <div class="enc-cell">
                    <div class="enc-k">Raw value</div>
                    <div class="enc-v" id="enc-raw-${i}">--</div>
                  </div>
                </div>
                <p class="enc-error" id="enc-error-${i}"></p>
              </div>
              <div class="encoder-plot">
                <div class="enc-chart-wrap">
                  <div class="enc-chart-head">
                    <span id="enc-chart-label-${i}">Shaft angle (&deg;) &middot; last 30 s</span>
                    <select id="enc-chart-metric-${i}" onchange="resetChart(${i})">
                      <option value="angle_deg">Shaft angle</option>
                      <option value="total_angle_deg">Total angle</option>
                      <option value="revolutions">Revolutions</option>
                    </select>
                  </div>
                  <canvas id="enc-chart-${i}" width="600" height="240"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    // ---------------- Per-motor state ----------------
    const ENC_WINDOW_MS = 30000;
    const ENC_METRICS = {
      angle_deg:       { label: 'Shaft angle (°) · last 30 s',  unit: '°' },
      total_angle_deg: { label: 'Total angle (°) · last 30 s',  unit: '°' },
      revolutions:     { label: 'Revolutions · last 30 s',      unit: '' },
    };
    const units = {};   // id -> { speedTimer, accelTimer, liveTimer, encSamples, turnsZero, lastRevolutions }

    function el(name, i) { return document.getElementById(`${name}-${i}`); }

    // ---------------- Stepper motor ----------------
    function applyMotor(i, s) {
      el('dir-cw', i).classList.toggle('active', s.direction === 'cw');
      el('dir-ccw', i).classList.toggle('active', s.direction === 'ccw');
      el('speed-slider', i).value = s.speed;
      el('speed-label', i).textContent = s.speed;
      el('rpm-label', i).textContent = s.rpm;
      el('fsteps-input', i).value = s.full_steps_per_rev;
      el('micro-input', i).value = s.microstepping;
      el('accel-slider', i).value = s.accel;
      el('accel-label', i).textContent = s.accel;
      updateLive(i, s);
    }

    function updateLive(i, s) {
      const state = el('motor-state', i);
      if (s.stopping) {
        state.textContent = 'STOPPING';
        state.style.color = '#ffb84a';
      } else if (s.enabled) {
        state.textContent = 'RUNNING';
        state.style.color = '#00ff88';
      } else {
        state.textContent = 'STOPPED';
        state.style.color = '#e03e3e';
      }
      el('live-rpm', i).textContent = s.current_rpm;
      el('live-sps', i).textContent = s.current_speed;
      updateLivePolling(i, s.enabled || s.stopping);
    }

    function updateLivePolling(i, running) {
      const u = units[i];
      if (running && u.liveTimer === null) {
        u.liveTimer = setInterval(() => pollLive(i), 400);
      } else if (!running && u.liveTimer !== null) {
        clearInterval(u.liveTimer);
        u.liveTimer = null;
      }
    }

    async function pollLive(i) {
      const res = await fetch(`/motor/${i}/status`);
      updateLive(i, await res.json());
    }

    async function fetchMotor(i) {
      const res = await fetch(`/motor/${i}/status`);
      applyMotor(i, await res.json());
    }

    async function setMotor(i, action) {
      const res = await fetch(`/motor/${i}/${action}`, { method: 'POST' });
      applyMotor(i, await res.json());
    }

    async function postJSON(i, path, body) {
      const res = await fetch(`/motor/${i}/${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      applyMotor(i, await res.json());
    }

    function softStop(i) { postJSON(i, 'disable', { soft: true }); }
    function hardStop(i) { postJSON(i, 'disable', { soft: false }); }
    function setDirection(i, dir) { postJSON(i, 'direction', { direction: dir }); }

    function setRpm(i) {
      const rpm = parseFloat(el('rpm-input', i).value) || 0;
      postJSON(i, 'rpm', { rpm });
    }

    function setGeometry(i) {
      const full_steps_per_rev = parseInt(el('fsteps-input', i).value, 10) || 200;
      const microstepping = parseInt(el('micro-input', i).value, 10) || 1;
      postJSON(i, 'geometry', { full_steps_per_rev, microstepping });
    }

    function onSpeedInput(i, value) {
      el('speed-label', i).textContent = value;
      clearTimeout(units[i].speedTimer);
      units[i].speedTimer = setTimeout(() => commitSpeed(i, value), 120);
    }
    function commitSpeed(i, value) {
      clearTimeout(units[i].speedTimer);
      postJSON(i, 'speed', { speed: parseInt(value, 10) });
    }

    function onAccelInput(i, value) {
      el('accel-label', i).textContent = value;
      clearTimeout(units[i].accelTimer);
      units[i].accelTimer = setTimeout(() => commitAccel(i, value), 120);
    }
    function commitAccel(i, value) {
      clearTimeout(units[i].accelTimer);
      postJSON(i, 'accel', { accel: parseInt(value, 10) });
    }

    // ---------------- Encoder (always live) ----------------
    function resetTurns(i) {
      units[i].turnsZero = units[i].lastRevolutions;
      el('enc-turns', i).textContent = '0.00';
    }

    function resetChart(i) {
      units[i].encSamples = [];
      const metric = el('enc-chart-metric', i).value;
      el('enc-chart-label', i).textContent = ENC_METRICS[metric].label;
      drawChart(i);
    }

    async function pollEncoder(i) {
      try {
        const res = await fetch(`/motor/${i}/encoder`);
        applyEncoder(i, await res.json());
      } catch (e) {
        el('enc-error', i).textContent = 'request failed';
      }
    }

    function applyEncoder(i, d) {
      const u = units[i];
      const err = el('enc-error', i);
      const badge = el('enc-live', i);
      if (!d.available || d.error) {
        err.textContent = !d.available
          ? 'UART not available: ' + (d.error || 'unknown')
          : d.error;
        badge.classList.add('stale');
        badge.textContent = '○ NO SIGNAL';
        return;
      }
      err.textContent = '';
      badge.classList.remove('stale');
      badge.textContent = '● LIVE';
      // Display the geared OUTPUT-shaft motion (equals motor shaft when 1:1).
      const angle = d.output_angle_deg;
      const totalAngle = d.output_total_angle_deg;
      const revs = d.output_revolutions;
      u.lastRevolutions = revs;
      if (u.turnsZero === null) u.turnsZero = revs;
      el('enc-turns', i).textContent = (revs - u.turnsZero).toFixed(2);
      el('enc-angle', i).textContent = angle.toFixed(1);
      el('enc-revs', i).textContent = revs.toFixed(3);
      el('enc-total', i).textContent = totalAngle.toFixed(1);
      el('enc-raw', i).textContent = d.value;
      el('enc-needle', i).style.transform =
        `translate(-50%, -100%) rotate(${angle}deg)`;

      const now = Date.now();
      u.encSamples.push({
        t: now,
        angle_deg: angle,
        total_angle_deg: totalAngle,
        revolutions: revs,
      });
      while (u.encSamples.length && now - u.encSamples[0].t > ENC_WINDOW_MS) {
        u.encSamples.shift();
      }
      drawChart(i);
    }

    function drawChart(i) {
      const canvas = el('enc-chart', i);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const padL = 46, padR = 8, padT = 10, padB = 18;
      const metric = el('enc-chart-metric', i).value;
      const unit = ENC_METRICS[metric].unit;
      const samples = units[i].encSamples;

      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = '#2a2d3e';
      ctx.lineWidth = 1;
      ctx.strokeRect(padL, padT, W - padL - padR, H - padT - padB);

      if (samples.length < 2) {
        ctx.fillStyle = '#5a6178';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Collecting data…', W / 2, H / 2);
        return;
      }

      const now = Date.now();
      const tMin = now - ENC_WINDOW_MS, tMax = now;
      let vMin = Infinity, vMax = -Infinity;
      for (const s of samples) {
        if (s[metric] < vMin) vMin = s[metric];
        if (s[metric] > vMax) vMax = s[metric];
      }
      if (vMin === vMax) { vMin -= 1; vMax += 1; }
      const pad = (vMax - vMin) * 0.1;
      vMin -= pad; vMax += pad;

      const x = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
      const y = v => padT + (1 - (v - vMin) / (vMax - vMin)) * (H - padT - padB);

      ctx.fillStyle = '#9aa4bf';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (let k = 0; k <= 4; k++) {
        const v = vMin + (vMax - vMin) * k / 4;
        const yy = y(v);
        ctx.strokeStyle = 'rgba(42,45,62,0.6)';
        ctx.beginPath();
        ctx.moveTo(padL, yy);
        ctx.lineTo(W - padR, yy);
        ctx.stroke();
        ctx.fillText(v.toFixed(unit === '' ? 2 : 0) + unit, padL - 4, yy);
      }

      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let s = 0; s <= 30; s += 10) {
        const tt = now - s * 1000;
        ctx.fillText('-' + s + 's', x(tt), H - padB + 4);
      }

      ctx.strokeStyle = '#4a78ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      samples.forEach((s, k) => {
        const px = x(s.t), py = y(s[metric]);
        if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();

      const last = samples[samples.length - 1];
      ctx.fillStyle = '#a0cfff';
      ctx.beginPath();
      ctx.arc(x(last.t), y(last[metric]), 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---------------- Init ----------------
    const container = document.getElementById('units');
    container.innerHTML = MOTORS.map(unitHTML).join('');
    MOTORS.forEach(m => {
      units[m.id] = {
        speedTimer: null, accelTimer: null, liveTimer: null,
        encSamples: [], turnsZero: null, lastRevolutions: 0,
      };
      fetchMotor(m.id);
      // Self-scheduling poll: wait for each request to finish before issuing
      // the next, so slow/non-responding encoders can't flood the server and
      // exhaust the browser's connection pool (which would also stall the
      // motor control requests). Stagger motors so they don't all fire at once.
      const ENC_POLL_MS = 500;
      const scheduleEncoder = () => {
        pollEncoder(m.id).finally(() => setTimeout(scheduleEncoder, ENC_POLL_MS));
      };
      setTimeout(scheduleEncoder, m.id * 120);
    });
  </script>
</body>
</html>
